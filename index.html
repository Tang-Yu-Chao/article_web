<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的文章站</title>
    <style>
        body { margin: 20px; background: #f2f2f7; font-family: -apple-system, sans-serif; }
        h1 { text-align: center; }
        #article-list { list-style: none; padding: 0; }
        .article-item {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .article-item a {
            text-decoration: none;
            color: #007aff;
            font-size: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h1>📚 文章列表</h1>
    <ul id="article-list">加载中...</ul>

    <script>
        async function loadList() {
            try {
                const res = await fetch('./articles.json');
                const articles = await res.json();
                const listEl = document.getElementById('article-list');
                listEl.innerHTML = '';
                articles.forEach(article => {
                    const li = document.createElement('li');
                    li.className = 'article-item';
                    li.innerHTML = `<a href="./article.html?slug=${article.slug}">${article.title}</a>`;
                    listEl.appendChild(li);
                });
            } catch (e) {
                document.getElementById('article-list').innerText = '加载失败: ' + e.message;
            }
        }
        loadList();
    </script>
</body>
</html>
